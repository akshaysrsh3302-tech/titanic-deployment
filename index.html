<!DOCTYPE html>
<html>
<head>
    <title>Titanic Survival Predictor</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        input, select { margin: 10px 0; padding: 8px; width: 300px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <h1>🚢 Titanic Survival Predictor</h1>
    
    <form method="POST">
        Pclass (1,2,3): <input type="number" name="Pclass" min="1" max="3" value="3"><br>
        Sex: 
        <select name="Sex">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select><br>
        Age: <input type="number" name="Age" step="0.1" value="25"><br>
        SibSp: <input type="number" name="SibSp" value="0"><br>
        Parch: <input type="number" name="Parch" value="0"><br>
        Fare: <input type="number" name="Fare" step="0.01" value="10"><br>
        Embarked: 
        <select name="Embarked">
            <option value="S">S (Southampton)</option>
            <option value="C">C (Cherbourg)</option>
            <option value="Q">Q (Queenstown)</option>
        </select><br>
        Title (Mr, Mrs, Miss, Master, Rare): <input type="text" name="Title" value="Mr"><br><br>
        <button type="submit">Predict if they Survived</button>
    </form>

    {% if prediction %}
        <h2 style="color: green;">{{ prediction }}</h2>
        <p><strong>Survival Probability:</strong> {{ probability }}%</p>
    {% endif %}
</body>
</html>
